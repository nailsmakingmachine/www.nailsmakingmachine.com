# 1. CANONICAL HTTP -> HTTPS & NON-WWW -> WWW ENFORCEMENT MATRIX
server {
    listen 80;
    listen [::]:80;
    server_name nailsmakingmachine.com www.nailsmakingmachine.com;
    return 301 https://www.nailsmakingmachine.com$request_uri;
}

# 2. HIGH-PERFORMANCE HTTPS PRODUCTION BLOCK
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.nailsmakingmachine.com;

    # Non-WWW HTTPS to WWW HTTPS Canonical Redirect
    if ($host = 'nailsmakingmachine.com') {
        return 301 https://www.nailsmakingmachine.com$request_uri;
    }

    # Certificate Path Framework Layout (Update with your Let's Encrypt / SSL paths)
    # ssl_certificate /etc/letsencrypt/live/nailsmakingmachine.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/nailsmakingmachine.com/privkey.pem;

    # Production Root Path Directory Mapping
    root /var/www/html;
    index index.html;

    # Character Encoding Layer
    charset utf-8;

    # Global Security Headers (Mitigates Cross-Site Scripting Layer Vulnerabilities)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "upgrade-insecure-requests" always;

    # Clean Anchor & SPA Fallback Router Processing Engine
    location / {
        # Check for asset files first, then safely route cleanly via the 'p' query variable
        try_files $uri $uri/ /index.html?p=$uri;
    }

    # Custom Error Routing Array (Preserves Semantic 404 Status Profiles)
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # GZIP NETWORK COMPRESSION SETUP (MINIMIZES OVER-THE-AIR SPEED METRICS)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        image/x-icon;

    # BROWSER CACHING MATRICES FOR MAXIMUM GOOGLE LIGHTHOUSE SCORE
    # Next-Gen Media Formats Asset Preservation (WebP Imagery & PDF Brochures)
    location ~* \.(webp|png|jpg|jpeg|gif|ico|pdf)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        log_not_found off;
        access_log off;
    }

    # Front-End Structure & Dynamic Application Shell Manifest Layers
    location ~* \.(webmanifest|xml)$ {
        expires 1w;
        add_header Cache-Control "public, no-transform";
        log_not_found off;
        access_log off;
    }

    # Block access to hidden critical system environment directories
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
