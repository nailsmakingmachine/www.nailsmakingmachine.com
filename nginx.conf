# Nginx Platform Level Performance & Cache Matrix Rule Declarations
server {
    listen 80;
    listen [::]:80;
    server_name nailsmakingmachine.com www.nailsmakingmachine.com;
    return 301 https://www.nailsmakingnailmachine.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.nailsmakingmachine.com;

    root /var/www/html;
    index index.html;

    # Gzip High Performance Text Packet Compression Configuration
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Secure Cross-Site Privacy Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self' https://www.youtube-nocookie.com; frame-src 'self' https://www.youtube-nocookie.com; connect-src 'self';" always;

    # Long Caching Strategy for Static Media Files (1 Year Cache Life)
    location ~* \.(webp|png|jpg|jpeg|ico|svg|pdf|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform, immutable";
        access_log off;
    }

    # Static CSS and JS Asset Caching Strategy (30 Days Cache Life)
    location ~* \.(css|js)$ {
        expires 30d;
        add_header Cache-Control "public, must-revalidate";
        access_log off;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
