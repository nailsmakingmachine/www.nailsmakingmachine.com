# ----------------------------------------------------------------------
# NAILS MAKING MACHINE — NGINX HIGH-PERFORMANCE REVERSE PROXY & SERVER BLOCK
# ----------------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name nailsmakingmachine.com www.nailsmakingmachine.com;

    # Production Root Path Directory Mapping
    root /var/www/html;[cite: 1]
    index index.html;[cite: 1]

    # Character Encoding Layer
    charset utf-8;[cite: 1]

    # Global Security Headers (Mitigates Cross-Site Scripting Layer Vulnerabilities)
    add_header X-Frame-Options "SAMEORIGIN" always;[cite: 1]
    add_header X-XSS-Protection "1; mode=block" always;[cite: 1]
    add_header X-Content-Type-Options "nosniff" always;[cite: 1]
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "upgrade-insecure-requests" always;

    # Clean Anchor & SPA Fallback Route Processing Engine
    location / {
        try_files $uri $uri/ /index.html =404;[cite: 1]
    }

    # Custom Error Routing Array (Preserves Semantic 404 Status Profiles)
    error_page 404 /404.html;[cite: 1]
    location = /404.html {
        internal;
    }

    # GZIP NETWORK COMPRESSION SETUP (MINIMIZES OVER-THE-AIR SPEED METRICS)
    gzip on;[cite: 1]
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain[cite: 1]
        text/css[cite: 1]
        text/xml[cite: 1]
        text/javascript
        application/javascript[cite: 1]
        application/x-javascript
        application/json[cite: 1]
        application/xml[cite: 1]
        application/rss+xml
        application/atom+xml
        image/svg+xml
        image/x-icon;

    # BROWSER CACHING MATRICES FOR MAXIMUM GOOGLE LIGHTHOUSE SCORE
    # Next-Gen Media Formats Asset Preservation (WebP Imagery & PDF Brochures)
    location ~* \.(webp|png|jpg|jpeg|gif|ico|pdf)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        log_not_found off;
        access_log off;
    }

    # Front-End Structure & Dynamic Application Shell Manifest Layers
    location ~* \.(webmanifest|xml)$ {
        expires 1w;
        add_header Cache-Control "public, no-transform";
        log_not_found off;
        access_log off;
    }

    # Block access to hidden critical system environment directories
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
