    <style>
        /* Modern Premium Design Variables */
        :root {
            --bg-main: #060913;
            --bg-surface: rgba(13, 20, 38, 0.45);
            --bg-surface-solid: #0b1122;
            --accent-glow: #00e5ff;
            --accent-blue: #0066ff;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --border-glass: rgba(255, 255, 255, 0.07);
            --border-glow: rgba(0, 229, 255, 0.2);
            --font-display: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --transition-fluid: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Reset & Base System Layouts */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        html, body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: var(--font-display);
            overflow-x: hidden;
            scroll-behavior: smooth;
            line-height: 1.6;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-main);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-glow);
        }

        /* 3D WebGL Canvas Layer */
        #webgl-canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        /* App Shell Layout structure */
        .app-container {
            position: relative;
            z-index: 1;
            width: 100%;
        }

        header {

            top: 0;
            left: 0;
            width: 100%;
            height: 80px;

            border-bottom: 1px solid var(--border-glass);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            transition: var(--transition-fluid);
        }

        header.scrolled {
            background: rgba(6, 9, 19, 0.85);
            height: 70px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            border: 2px solid var(--accent-glow);
            border-radius: 6px;
            transform: rotate(45deg);
            box-shadow: 0 0 15px var(--accent-glow);
            position: relative;
        }

        .logo-text {
            font-weight: 800;
            font-size: 1.3rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff, var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav {
            display: flex;
            gap: 2.5rem;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
            transition: var(--transition-fluid);
            position: relative;
            padding: 5px 0;
        }

        nav a:hover, nav a.active {
            color: var(--text-primary);
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--accent-glow);
            transition: var(--transition-fluid);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        nav a:hover::after, nav a.active::after {
            width: 100%;
        }

        .card-btn-glow {

        .category-divider {

        .input-group label {

            color: var(--text-secondary);
