<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
        // Dynamic path-routing engine compatible with root domains and sub-folders
        var currentLoc = window.location;
        
        // Split path segments to easily separate folders from target view parameters
        var pathSegments = currentLoc.pathname.split('/').filter(Boolean);
        
        // Capture the true final route segment
        var cleanPath = pathSegments[pathSegments.length - 1] || '';
        
        // Ignore files with extensions (like .png or .css) to prevent asset loops
        if (cleanPath && !cleanPath.includes('.')) {
            // Rebuild base path matching your current sub-folder depth layout
            var basePath = pathSegments.slice(0, -1).join('/');
            var targetUrl = currentLoc.protocol + '//' + currentLoc.hostname + 
                            (currentLoc.port ? ':' + currentLoc.port : '') + '/' + 
                            (basePath ? basePath + '/' : '') + '?p=' + encodeURIComponent(cleanPath);
            
            currentLoc.replace(targetUrl);
        } else {
            // Safe fallback back to home directory level base root
            var fallbackPath = pathSegments.join('/');
            // If the broken path was just an asset file, fall back to root path safely
            if (cleanPath.includes('.')) { fallbackPath = pathSegments.slice(0, -1).join('/'); }
            
            currentLoc.replace(
                currentLoc.protocol + '//' + currentLoc.hostname + 
                (currentLoc.port ? ':' + currentLoc.port : '') + '/' + 
                (fallbackPath ? fallbackPath + '/' : '')
            );
        }
    </script>
</head>
<body>
    <p>Navigating to requested machinery profile... Please hold.</p>
</body>
</html>
