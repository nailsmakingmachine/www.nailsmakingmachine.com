<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
        // Captures clean URL requests (e.g., /about) and translates them into a query string for index.html
        var currentLoc = window.location;
        var cleanPath = currentLoc.pathname.replace(/^\/|\/$/g, '');
        
        if (cleanPath && !cleanPath.includes('.')) {
            currentLoc.replace(
                currentLoc.protocol + '//' + currentLoc.hostname + 
                (currentLoc.port ? ':' + currentLoc.port : '') + '/?p=' + encodeURIComponent(cleanPath)
            );
        } else {
            currentLoc.replace(currentLoc.protocol + '//' + currentLoc.hostname + (currentLoc.port ? ':' + currentLoc.port : '') + '/');
        }
    </script>
</head>
<body>
    <p>Navigating to requested machinery profile... Please hold.</p>
</body>
</html>
