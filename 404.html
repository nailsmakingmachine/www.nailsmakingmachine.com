<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Guarantee search engine spiders never index broken query routing loops -->
    <meta name="robots" content="noindex, nofollow">
    <title>Redirecting...</title>
    <script type="text/javascript">
        // Dynamic path-routing engine compatible with root domains and sub-folders
        var currentLoc = window.location;
        
        // Split path segments to easily separate folders from target view parameters
        var pathSegments = currentLoc.pathname.split('/').filter(Boolean);
        
        // Capture the true final route segment
        var cleanPath = pathSegments[pathSegments.length - 1] || '';
        
        // Retain original search parameters (?utm_source...) and hashes (#anchor)
        const incomingQuery = currentLoc.search;
        const incomingHash = currentLoc.hash;
        
        // Ignore files with extensions (like .png or .css) to prevent asset loops
        if (cleanPath && !cleanPath.includes('.')) {
            // Rebuild base path matching your current sub-folder depth layout
            var basePath = pathSegments.slice(0, -1).join('/');
            
            // Build target parameters, safely blending original search entries if they exist
            var parameterGlue = incomingQuery ? incomingQuery + '&p=' : '?p=';
            
            var targetUrl = currentLoc.protocol + '//' + currentLoc.hostname + 
                            (currentLoc.port ? ':' + currentLoc.port : '') + '/' + 
                            (basePath ? basePath + '/' : '') + 
                            parameterGlue + encodeURIComponent(cleanPath) + 
                            incomingHash;
            
            currentLoc.replace(targetUrl);
        } else {
            // Safe fallback back to home directory level base root
            var fallbackPath = pathSegments.join('/');
            // If the broken path was just an asset file, fall back to root path safely
            if (cleanPath.includes('.')) { fallbackPath = pathSegments.slice(0, -1).join('/'); }
            
            currentLoc.replace(
                currentLoc.protocol + '//' + currentLoc.hostname + 
                (currentLoc.port ? ':' + currentLoc.port : '') + '/' + 
                (fallbackPath ? fallbackPath + '/' : '') + 
                incomingQuery + 
                incomingHash
            );
        }
    </script>
</head>
<body>
    <div style="font-family: system-ui, -apple-system, sans-serif; text-align: center; padding: 60px 24px; color: #111111; max-width: 500px; margin: 0 auto;">
        <h1 style="text-transform: uppercase; font-weight: 800; font-size: 1.8rem; letter-spacing: -0.5px; color: #ba181b; margin-bottom: 12px;">Navigating Node Matrix...</h1>
        <p style="color: #6c757d; font-size: 0.9rem; line-height: 1.5;">Connecting to the requested machinery showroom profile. Please hold.</p>
    </div>
</body>
</html>
