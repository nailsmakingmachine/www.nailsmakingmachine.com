        const mobileBtn = document.getElementById('mobile-menu-btn');

        function initThreeJS() { const container = document.getElementById('canvas-container'); const scene = new THREE.Scene(); const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000); camera.position.z = 25; camera.position.y = 5; const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight); container.appendChild(renderer.domElement); scene.add(new THREE.AmbientLight(0xffffff, 0.3)); const pointLight = new THREE.PointLight(0xD4AF37, 2, 100); pointLight.position.set(10, 10, 10); scene.add(pointLight); const auraGroup = new THREE.Group(); scene.add(auraGroup); const mat = new THREE.MeshStandardMaterial({ color: 0xD4AF37, metalness: 0.9, roughness: 0.2 }); const centralKnot = new THREE.Mesh(new THREE.TorusKnotGeometry(6, 1.5, 200, 32, 3, 4), mat); auraGroup.add(centralKnot); for(let i=0; i<3; i++) { const ring = new THREE.Mesh(new THREE.TorusGeometry(12+(i*3), 0.2, 16, 100), mat); ring.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0); ring.userData = { rx: (Math.random()-0.5)*0.005, ry: (Math.random()-0.5)*0.005 }; auraGroup.add(ring); } let mouseX = 0, mouseY = 0; document.addEventListener('mousemove', e => { mouseX = e.clientX - window.innerWidth/2; mouseY = e.clientY - window.innerHeight/2; }); function animate() { requestAnimationFrame(animate); centralKnot.rotation.y += 0.002; centralKnot.rotation.x += 0.001; auraGroup.children.forEach((c, i) => { if(i>0) { c.rotation.x+=c.userData.rx; c.rotation.y+=c.userData.ry; }}); auraGroup.rotation.y += 0.05 * (mouseX*0.001 - auraGroup.rotation.y); auraGroup.rotation.x += 0.05 * (mouseY*0.001 - auraGroup.rotation.x); renderer.render(scene, camera); } animate(); window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }); } window.onload = initThreeJS;
